{% load static %}
<!DOCTYPE html><html class="light" lang="en" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>
    {% block title %}
    #Store
    {% endblock %}
</title>
<!-- Material Symbols Outlined -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#0053db",
                        "outline-variant": "#c3c6d7",
                        "surface-bright": "#faf8ff",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#131b2e",
                        "on-secondary-fixed": "#00174b",
                        "on-error": "#ffffff",
                        "outline": "#737686",
                        "inverse-on-surface": "#eef0ff",
                        "primary-container": "#2563eb",
                        "primary-fixed": "#dbe1ff",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-primary-container": "#eeefff",
                        "surface-container-low": "#f2f3ff",
                        "on-tertiary-container": "#ffede6",
                        "surface-container-highest": "#dae2fd",
                        "secondary-fixed-dim": "#b4c5ff",
                        "tertiary": "#943700",
                        "surface": "#faf8ff",
                        "background": "#faf8ff",
                        "on-primary-fixed": "#00174b",
                        "inverse-surface": "#283044",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "secondary": "#495c95",
                        "primary": "#004ac6",
                        "on-secondary-container": "#394c84",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#434655",
                        "surface-container": "#eaedff",
                        "surface-variant": "#dae2fd",
                        "secondary-container": "#acbfff",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#ffb596",
                        "inverse-primary": "#b4c5ff",
                        "on-tertiary-fixed": "#360f00",
                        "on-error-container": "#93000a",
                        "on-background": "#131b2e",
                        "surface-container-high": "#e2e7ff",
                        "tertiary-fixed": "#ffdbcd",
                        "secondary-fixed": "#dbe1ff",
                        "tertiary-container": "#bc4800",
                        "surface-dim": "#d2d9f4",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed-variant": "#31447b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "margin-desktop": "64px",
                        "margin-mobile": "20px",
                        "base": "8px",
                        "gutter": "24px",
                        "container-max": "1200px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "display": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
    <link rel="stylesheet" href="{% static 'css/auth_base.css' %}">
    {% block styles %}
    {% endblock %}
</head>
<body class="min-h-screen flex flex-col items-center">
<!-- TopAppBar Section (Shared Component) -->
<header class="bg-surface dark:bg-on-surface w-full py-stack-md flex justify-center items-center px-margin-mobile md:px-margin-desktop">
<div class="flex justify-center w-full">
    <a href="{% url 'home' %}">
<span class="font-display text-headline-md font-bold text-primary dark:text-primary-fixed cursor-pointer transition-all duration-200 hover:opacity-80 transition-opacity">#Store</span>
</div>
</a>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-start w-full px-margin-mobile mt-stack-lg">
    {% block content %}
    {% endblock %}
    </main>
<!-- Footer Section (Shared Component) -->
<footer class="flex flex-col items-center gap-stack-sm w-full mt-auto bg-surface dark:bg-on-surface py-stack-lg border-t border-outline-variant dark:border-outline">
<div class="flex flex-wrap justify-center gap-gutter">
<a class="font-body-sm text-body-sm text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed underline transition-colors cursor-pointer" href="#">Conditions of Use</a>
<a class="font-body-sm text-body-sm text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed underline transition-colors cursor-pointer" href="#">Privacy Notice</a>
<a class="font-body-sm text-body-sm text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed underline transition-colors cursor-pointer" href="#">Help</a>
</div>
<p class="font-body-sm text-on-surface-variant">

© 2026 #Store. All rights reserved.

</p>
</footer>
<script src="{% static 'js/auth_base.js' %}"></script>
{% block scripts %}
{% endblock %}

</body></html>
